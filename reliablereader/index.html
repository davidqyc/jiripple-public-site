<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReliableReader</title>
  <meta name="description" content="ReliableReader public pages and privacy policy.">
  <link rel="icon" type="image/svg+xml" href="/reliablereader/assets/reliablereader-app-icon.svg">
  <link rel="shortcut icon" type="image/svg+xml" href="/reliablereader/assets/reliablereader-app-icon.svg">
  <link rel="apple-touch-icon" href="/reliablereader/assets/reliablereader-app-icon.svg">
  <link rel="manifest" href="/reliablereader/site.webmanifest">
  <meta name="theme-color" content="#ffffff">
  <meta property="og:title" content="ReliableReader">
  <meta property="og:description" content="ReliableReader public pages and privacy policy.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://www.jiripple.com/reliablereader/assets/reliablereader-app-icon.svg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:image" content="https://www.jiripple.com/reliablereader/assets/reliablereader-app-icon.svg">
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.58;
      color: #202124;
      background: #ffffff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      display: grid;
      place-items: center;
    }

    main {
      width: min(100%, 680px);
      padding: 48px 20px;
      text-align: center;
    }

    img {
      width: 112px;
      height: 112px;
      border-radius: 24px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.2;
    }

    p {
      margin: 10px 0;
      color: #5f6368;
    }

    nav {
      margin-top: 24px;
    }

    a {
      color: #0b57d0;
      margin: 0 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color: #e8eaed;
        background: #111315;
      }

      body {
        background: #111315;
      }

      p {
        color: #bdc1c6;
      }

      a {
        color: #8ab4f8;
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="/reliablereader/assets/reliablereader-app-icon.svg" alt="ReliableReader app icon">
    <h1>ReliableReader</h1>
    <p>Public pages for ReliableReader.</p>
    <nav aria-label="ReliableReader public links">
      <a href="/reliablereader/privacy/">Privacy Policy</a>
      <a href="/reliablereader/privacy/zh-CN/">隐私政策</a>
    </nav>
  </main>
</body>
</html>
